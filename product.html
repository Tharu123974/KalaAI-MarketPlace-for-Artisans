<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Kala AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="container d-flex">
            <a href="index.html" class="logo">
                <i class="fas fa-palette text-primary"></i> Kala AI
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="upload.html">Generate</a></li>
                <li><a href="reviews.html">Intelligence</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="auth.html">Login</a></li>
                <li>
                    <select id="theme-switch" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.85rem; height: 32px; margin-top: -3px; border-color: var(--border);">
                        <option value="orange">🟠 Orange</option>
                        <option value="blue">🔵 Blue</option>
                        <option value="green">🟢 Green</option>
                        <option value="red">🔴 Red</option>
                    </select>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container" style="margin-top: 50px; margin-bottom: 50px;">
        <a href="shop.html" class="text-muted" style="display: inline-block; margin-bottom: 20px; font-size: 0.9rem; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Marketplace</a>
        
        <div class="product-template" style="display: flex; gap: 40px; background: var(--surface); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); align-items: flex-start; flex-wrap: wrap;">
            
            <div style="flex: 1; min-width: 300px;">
                <img id="tpl-img" src="" alt="Product" style="width: 100%; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); object-fit: cover;">
            </div>
            
            <div style="flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 300px;">
                <h1 id="tpl-title" style="font-size: 2.5rem; color: var(--text-main); margin-bottom: 0; line-height: 1.2;">Loading Title...</h1>
                
                <div id="tpl-artisan" class="text-muted" style="font-size: 1.1rem;"><i class="fas fa-store"></i> Artisan Store</div>
                
                <div id="tpl-price" class="text-primary" style="font-size: 2.2rem; font-weight: bold;">$0.00</div>
                
                <div style="margin-top: 10px;">
                    <h4 style="margin-bottom: 8px; font-size: 1.2rem; color: var(--text-main);">Cultural Story</h4>
                    <p id="tpl-story" class="text-muted" style="line-height: 1.6; font-style: italic; font-size: 1.05rem; padding: 15px; background: rgba(0,0,0,0.02); border-left: 3px solid var(--primary); border-radius: 4px;">Story goes here...</p>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    <button class="btn btn-secondary" style="flex: 1; padding: 15px; font-size: 1.1rem;" onclick="addToCart(document.getElementById('tpl-title').innerText, document.getElementById('tpl-price').innerText, document.getElementById('tpl-img').src)"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                    <button class="btn btn-primary" style="flex: 1; padding: 15px; font-size: 1.1rem;" onclick="buyProduct()"><i class="fas fa-shopping-bag"></i> Proceed to Checkout</button>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container pb-2 text-center" style="color: var(--text-muted); font-size: 0.9rem;">
            &copy; 2026 Kala AI. Empowering Artisans Globally.
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
