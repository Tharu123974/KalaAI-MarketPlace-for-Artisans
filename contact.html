<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Kala AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-wrapper {
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-palette text-primary"></i> Kala AI
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="upload.html">Generate</a></li>
                <li><a href="reviews.html">Intelligence</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="auth.html">Login</a></li>
                <li>
                    <select id="theme-switch" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.85rem; height: 32px; margin-top: -3px; border-color: var(--border);">
                        <option value="orange">🟠 Orange</option>
                        <option value="blue">🔵 Blue</option>
                        <option value="green">🟢 Green</option>
                        <option value="red">🔴 Red</option>
                    </select>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="text-center mb-4">
            <h1 style="font-size: 3rem;">Get in Touch</h1>
            <p class="text-muted">Have a question? We'd love to hear from you.</p>
        </div>

        <div class="contact-wrapper">
            <form onsubmit="event.preventDefault(); alert('Message Sent!'); this.reset();">
                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Full Name</label>
                <input type="text" class="form-control" required placeholder="Jane Doe">

                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Email Address</label>
                <input type="email" class="form-control" required placeholder="jane@example.com">

                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Message</label>
                <textarea rows="5" class="form-control" required placeholder="How can we help?"></textarea>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>

            <div class="text-center" style="margin-top: 30px;">
                <p>Or find us on</p>
                <div class="social-links" style="justify-content: center; margin-top: 15px;">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
