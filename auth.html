<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup - Kala AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 60px auto;
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .auth-toggle {
            display: flex;
            margin-bottom: 30px;
            background: rgba(211, 84, 0, 0.05);
            border-radius: var(--radius-sm);
            padding: 5px;
        }

        .toggle-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .toggle-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container d-flex">
            <a href="index.html" class="logo">
                <i class="fas fa-palette text-primary"></i> Kala AI
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="upload.html">Generate</a></li>
                <li><a href="reviews.html">Intelligence</a></li>
                <li><a href="auth.html" class="active">Login/Signup</a></li>
                <li>
                    <select id="theme-switch" class="btn btn-secondary" style="padding: 5px 10px; font-size: 0.85rem; height: 32px; margin-top: -3px; border-color: var(--border);">
                        <option value="orange">🟠 Orange</option>
                        <option value="blue">🔵 Blue</option>
                        <option value="green">🟢 Green</option>
                        <option value="red">🔴 Red</option>
                    </select>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h2 id="auth-title">Welcome Back</h2>
                <p class="text-muted" id="auth-subtitle">Login to manage your listings and sales.</p>
            </div>

            <div class="auth-toggle">
                <div class="toggle-btn active" id="btn-login" onclick="switchTab('login')">Login</div>
                <div class="toggle-btn" id="btn-signup" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Email Address</label>
                <input type="email" id="login-email" class="form-control" required placeholder="artisan@example.com">

                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Password</label>
                <input type="password" class="form-control" required placeholder="••••••••">

                <div style="display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 0.9rem;">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#" style="color: var(--primary);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                
                <div style="margin: 20px 0; text-align: center; color: var(--text-muted); position: relative;">
                    <hr style="border-top: 1px solid var(--border); margin: 0;">
                    <span style="background: var(--surface); padding: 0 10px; position: relative; top: -10px; font-size: 0.85rem;">OR</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn btn-secondary" style="flex: 1; padding: 10px; font-size: 0.85rem;" onclick="demoLogin('seller')"><i class="fas fa-hammer"></i> Demo Artisan</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1; padding: 10px; font-size: 0.85rem;" onclick="demoLogin('buyer')"><i class="fas fa-shopping-bag"></i> Demo Customer</button>
                </div>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="hidden" onsubmit="handleSignup(event)">
                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Full Name or Store Name</label>
                <input type="text" id="signup-name" class="form-control" required placeholder="Jaipur Craft House">

                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Email Address</label>
                <input type="email" id="signup-email" class="form-control" required placeholder="artisan@example.com">

                <label style="font-weight: 500; display: block; margin-bottom: 8px;">Account Type</label>
                <select id="account-type" class="form-control" required>
                    <option value="seller">Artisan / Seller</option>
                    <option value="buyer">Customer / Buyer</option>
                </select>

                <div style="position: relative;">
                    <label style="font-weight: 500; display: flex; justify-content: space-between; margin-bottom: 8px;">
                        Password 
                        <i class="fas fa-question-circle text-muted" id="pwd-info" style="cursor: pointer;"></i>
                    </label>
                    
                    <!-- Hover Tooltip -->
                    <div id="pwd-tooltip" style="display: none; position: absolute; right: 0; bottom: 85px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-lg); padding: 15px; border-radius: 8px; width: 250px; z-index: 10;">
                        <h5 style="margin-bottom: 5px; font-size: 0.9rem;">Password Must Have:</h5>
                        <ul style="list-style: none; font-size: 0.8rem; color: var(--text-muted);">
                            <li id="r-len"><i class="fas fa-check-circle"></i> at least 8 characters</li>
                            <li id="r-char"><i class="fas fa-check-circle"></i> 1 lower, 1 upper, 1 digit, 1 special</li>
                            <li id="r-seq"><i class="fas fa-check-circle"></i> No 3 consecutive characters (abc, 123)</li>
                        </ul>
                    </div>
                </div>
                
                <input type="password" id="signup-pwd" class="form-control" required placeholder="Create a strong password" oninput="validatePassword()">

                <button type="submit" id="signup-btn" disabled class="btn btn-primary" style="width: 100%; opacity: 0.6; cursor: not-allowed;">Create Account</button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const btnLogin = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                btnLogin.classList.add('active');
                btnSignup.classList.remove('active');
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Login to manage your listings and sales.';
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                btnLogin.classList.remove('active');
                btnSignup.classList.add('active');
                title.innerText = 'Join Kala AI';
                subtitle.innerText = 'Create an account to start buying or selling.';
            }
        }

        // Tooltip logic
        const infoIcon = document.getElementById('pwd-info');
        const tooltip = document.getElementById('pwd-tooltip');
        infoIcon.addEventListener('mouseenter', () => tooltip.style.display = 'block');
        infoIcon.addEventListener('mouseleave', () => tooltip.style.display = 'none');

        function validatePassword() {
            const pwd = document.getElementById('signup-pwd').value;
            const btn = document.getElementById('signup-btn');
            
            const r1 = pwd.length >= 8;
            const r2 = /[0-9]/.test(pwd) && /[a-z]/.test(pwd) && /[A-Z]/.test(pwd) && /[^a-zA-Z0-9]/.test(pwd);
            
            // c) No 3 consecutive chars
            let r3 = true;
            const upperPwd = pwd.toUpperCase();
            for(let i=0; i<upperPwd.length-2; i++) {
                let p1 = upperPwd.charCodeAt(i);
                let p2 = upperPwd.charCodeAt(i+1);
                let p3 = upperPwd.charCodeAt(i+2);
                if ((p2 === p1 + 1 && p3 === p2 + 1) || (p2 === p1 - 1 && p3 === p2 - 1)) {
                    r3 = false; break;
                }
            }

            document.getElementById('r-len').style.color = r1 ? '#27ae60' : 'var(--text-muted)';
            document.getElementById('r-char').style.color = r2 ? '#27ae60' : 'var(--text-muted)';
            document.getElementById('r-seq').style.color = (r3 && pwd.length > 0) ? '#27ae60' : 'var(--text-muted)';

            if (r1 && r2 && r3) {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
            } else {
                btn.disabled = true;
                btn.style.opacity = '0.6';
                btn.style.cursor = 'not-allowed';
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            localStorage.setItem('kala-loggedin', 'true');
            localStorage.setItem('kala-email', email);
            localStorage.setItem('kala-username', email.split('@')[0]);
            if(!localStorage.getItem('kala-role')) localStorage.setItem('kala-role', 'seller'); // default mock
            showToast('Logged in successfully!', 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);
        }

        function demoLogin(role) {
            localStorage.setItem('kala-loggedin', 'true');
            localStorage.setItem('kala-role', role);
            localStorage.setItem('kala-username', role === 'seller' ? 'Demo Artisan' : 'Demo Customer');
            localStorage.setItem('kala-email', 'demo@kala.ai');
            showToast(`Logged in as Demo ${role === 'seller' ? 'Artisan' : 'Customer'}!`, 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const role = document.getElementById('account-type').value;
            localStorage.setItem('kala-loggedin', 'true');
            localStorage.setItem('kala-role', role);
            localStorage.setItem('kala-username', name);
            localStorage.setItem('kala-email', email);
            showToast('Account created successfully!', 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);
        }
    </script>
</body>
</html>
